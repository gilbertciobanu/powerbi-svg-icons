<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96' width='100%' height='100%' fill='none'>
  <!--
    Icon Name  : Square Cross
    Style      : Minimalist, modern, flat (Fluent 2 Filled)
    Variant    : Filled
    Created    : 2026-03-08
    Prompt     : Based on frame-square-fluent, create "square-plus" with a transparent plus cutout centered inside.
    Summary    : [Workflow A] 96x96 viewBox; 4px padding; rx=15 Fluent square; transparent plus cutout via fill-rule evenodd compound path; plus 48x48 arms, 12px thick, centered at (48,48); pill stroke separate from compound fill
  -->
  <!-- Square fill with plus cutout (no stroke — stroke on plus causes artifacts) -->
  <path fill-rule='evenodd' fill='#1C3879' d='M19,4H77A15,15 0 0 1 92,19V77A15,15 0 0 1 77,92H19A15,15 0 0 1 4,77V19A15,15 0 0 1 19,4Z M42,24H54V42H72V54H54V72H42V54H24V42H42Z'/>
  <!-- Square outline stroke (separate so it doesn't stroke around plus) -->
  <rect x='4' y='4' width='88' height='88' rx='15' fill='none' stroke='#1C3879' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/>
</svg>
